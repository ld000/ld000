name: Update playable systems profile

on:
  workflow_dispatch:
  schedule:
    - cron: "17 20 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate playable systems profile assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USERNAME: ld000
        run: python scripts/update_pixel_profile.py

      - name: Commit updated assets
        run: |
          if git diff --quiet -- assets/hero-playable-systems.png assets/build-modes.png assets/project-bevy-tetris.png assets/project-redis-rust.png assets/project-spider.png assets/project-blog-hugo.png; then
            echo "Playable systems profile assets are already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/hero-playable-systems.png assets/build-modes.png assets/project-bevy-tetris.png assets/project-redis-rust.png assets/project-spider.png assets/project-blog-hugo.png
          git commit -m "Update playable systems profile assets"
          git push
