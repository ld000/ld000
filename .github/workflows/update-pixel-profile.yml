name: Update signal passport profile

on:
  workflow_dispatch:
  schedule:
    - cron: "17 20 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate signal passport profile assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USERNAME: ld000
        run: python scripts/update_pixel_profile.py

      - name: Commit updated assets
        run: |
          if git diff --quiet -- README.md scripts/update_pixel_profile.py assets/hero-signal-passport.png assets/signal-panel.png assets/CREDITS.md context/profile-readme.md; then
            echo "Signal passport profile assets are already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md scripts/update_pixel_profile.py assets/hero-signal-passport.png assets/signal-panel.png assets/CREDITS.md context/profile-readme.md
          git commit -m "Update signal passport profile assets"
          git push
