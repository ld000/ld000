name: Update pixel profile

on:
  workflow_dispatch:
  schedule:
    - cron: "17 20 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate pixel profile assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USERNAME: ld000
        run: python scripts/update_pixel_profile.py

      - name: Commit updated assets
        run: |
          if git diff --quiet -- assets/pixel-hero.svg assets/pixel-status.svg; then
            echo "Pixel profile assets are already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/pixel-hero.svg assets/pixel-status.svg
          git commit -m "Update pixel profile assets"
          git push
